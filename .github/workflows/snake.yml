name: Generate snake animation

on:
  schedule:
    # Twice a day. NOTE: "* */12 * * *" (from the old articles) fires EVERY
    # MINUTE for 12h — this is the correct twice-daily version.
    - cron: "0 */12 * * *"
  # Lets you run it manually from the Actions tab the first time.
  workflow_dispatch:
  # Regenerate on every push to main so the snake stays fresh.
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push SVGs to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
